# Gruvbox Dark
set -g status-style fg=#ebdbb2,bg=#282828
set -g status-right '#[fg=#7c6f64]mode:#{client_key_table} #[fg=#665c54]| #[default]%Y-%m-%d %H:%M '
setw -g window-status-current-format '#[fg=#282828,bg=#83a598,bold] #I:#W #[default]'
setw -g window-status-activity-style fg=#fabd2f,bold
set -g message-style fg=#282828,bg=#458588,bold
set -g mode-style fg=#282828,bg=#b8bb26,bold
setw -g pane-border-format ' #{?pane_active,#[fg=#83a598,bold],#[fg=#7c6f64]}#T #[default]'
setw -g pane-border-style fg=#504945
setw -g pane-active-border-style fg=#83a598
