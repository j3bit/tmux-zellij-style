# Zellij-inspired tmux config.
# Core idea:
# - Ctrl-g opens a zellij-like mode selector.
# - p/t/r/s/m/o choose pane/tab/resize/scroll/move/session flows.
# - Ctrl-b stays as raw tmux prefix escape hatch.

set -g prefix C-b
bind C-b send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g mode-keys vi
set -g status-keys vi
set -g set-clipboard on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename off
set -g allow-rename off
set -g detach-on-destroy off

set -g status on
set -g status-position top
set -g status-justify left
set -g status-left-length 24
set -g status-right-length 80
set -g status-style fg=colour252,bg=colour235
set -g status-left ' #[bold]#S #[default]'
set -g status-right '#[fg=colour245]mode:#{client_key_table} #[fg=colour240]| #[default]%Y-%m-%d %H:%M '
setw -g window-status-separator ''
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=colour232,bg=colour110,bold] #I:#W #[default]'
setw -g window-status-activity-style fg=colour214,bold
set -g message-style fg=colour231,bg=colour24,bold
setw -g pane-border-status top
setw -g pane-border-format ' #{?pane_active,#[fg=colour111,bold],#[fg=colour244]}#T #[default]'
setw -g pane-border-style fg=colour238
setw -g pane-active-border-style fg=colour111

# Fast zellij-like global moves. Arrow variants are more reliable than C-M-hjkl
# on some terminals, so both are included when possible.
bind -n C-M-Left if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind -n C-M-Right if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-M-h if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind -n C-M-l if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"
bind -n C-M-k select-pane -U
bind -n C-M-j select-pane -D
bind -n C-M-n split-window -v -c "#{pane_current_path}"

# Raw tmux escape hatch.
bind R source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"

# Ctrl-g => zellij-style mode launcher.
bind -n C-g switch-client -T zellij-normal

# Normal mode.
bind -T zellij-normal p switch-client -T zellij-pane
bind -T zellij-normal t switch-client -T zellij-tab
bind -T zellij-normal r switch-client -T zellij-resize
bind -T zellij-normal s copy-mode \; switch-client -T root
bind -T zellij-normal m switch-client -T zellij-move
bind -T zellij-normal o switch-client -T zellij-session
bind -T zellij-normal q detach-client
bind -T zellij-normal Q confirm-before -p "kill session #S? (y/n)" "kill-session"
bind -T zellij-normal ? display-popup -w 80% -h 80% -T "tmux keymap hints" -E "less -R ~/.config/tmux/tmux_keys.txt" \; switch-client -T root
bind -T zellij-normal Enter switch-client -T root
bind -T zellij-normal Escape switch-client -T root
bind -T zellij-normal C-g switch-client -T root

# Pane mode.
bind -T zellij-pane Left select-pane -L \; switch-client -T zellij-pane
bind -T zellij-pane Down select-pane -D \; switch-client -T zellij-pane
bind -T zellij-pane Up select-pane -U \; switch-client -T zellij-pane
bind -T zellij-pane Right select-pane -R \; switch-client -T zellij-pane
bind -T zellij-pane h select-pane -L \; switch-client -T zellij-pane
bind -T zellij-pane j select-pane -D \; switch-client -T zellij-pane
bind -T zellij-pane k select-pane -U \; switch-client -T zellij-pane
bind -T zellij-pane l select-pane -R \; switch-client -T zellij-pane
bind -T zellij-pane c command-prompt -I "#{pane_title}" "select-pane -T '%%'" \; switch-client -T root
bind -T zellij-pane d split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind -T zellij-pane e display-message "tmux cannot toggle pane embed/floating like zellij." \; switch-client -T root
bind -T zellij-pane f resize-pane -Z \; switch-client -T root
bind -T zellij-pane i display-message "tmux has no pinned pane equivalent." \; switch-client -T root
bind -T zellij-pane n split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind -T zellij-pane r split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind -T zellij-pane s select-layout tiled \; switch-client -T root
bind -T zellij-pane w display-message "tmux has no floating pane layer like zellij." \; switch-client -T root
bind -T zellij-pane x kill-pane \; switch-client -T root
bind -T zellij-pane z if-shell -F "#{==:#{pane-border-status},off}" "setw pane-border-status top" "setw pane-border-status off" \; switch-client -T root
bind -T zellij-pane Tab last-pane \; switch-client -T zellij-pane
bind -T zellij-pane p switch-client -T zellij-normal
bind -T zellij-pane Enter switch-client -T root
bind -T zellij-pane Escape switch-client -T root
bind -T zellij-pane C-g switch-client -T root

# Tab mode.
bind -T zellij-tab Left previous-window \; switch-client -T zellij-tab
bind -T zellij-tab Down next-window \; switch-client -T zellij-tab
bind -T zellij-tab Up previous-window \; switch-client -T zellij-tab
bind -T zellij-tab Right next-window \; switch-client -T zellij-tab
bind -T zellij-tab h previous-window \; switch-client -T zellij-tab
bind -T zellij-tab j next-window \; switch-client -T zellij-tab
bind -T zellij-tab k previous-window \; switch-client -T zellij-tab
bind -T zellij-tab l next-window \; switch-client -T zellij-tab
bind -T zellij-tab 1 select-window -t :=1 \; switch-client -T root
bind -T zellij-tab 2 select-window -t :=2 \; switch-client -T root
bind -T zellij-tab 3 select-window -t :=3 \; switch-client -T root
bind -T zellij-tab 4 select-window -t :=4 \; switch-client -T root
bind -T zellij-tab 5 select-window -t :=5 \; switch-client -T root
bind -T zellij-tab 6 select-window -t :=6 \; switch-client -T root
bind -T zellij-tab 7 select-window -t :=7 \; switch-client -T root
bind -T zellij-tab 8 select-window -t :=8 \; switch-client -T root
bind -T zellij-tab 9 select-window -t :=9 \; switch-client -T root
bind -T zellij-tab "[" swap-window -t -1 \; switch-client -T root
bind -T zellij-tab "]" swap-window -t +1 \; switch-client -T root
bind -T zellij-tab b break-pane -d \; switch-client -T root
bind -T zellij-tab n new-window -c "#{pane_current_path}" \; switch-client -T root
bind -T zellij-tab r command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T root
bind -T zellij-tab s set-window-option synchronize-panes \; switch-client -T root
bind -T zellij-tab x kill-window \; switch-client -T root
bind -T zellij-tab Tab last-window \; switch-client -T zellij-tab
bind -T zellij-tab t switch-client -T zellij-normal
bind -T zellij-tab Enter switch-client -T root
bind -T zellij-tab Escape switch-client -T root
bind -T zellij-tab C-g switch-client -T root

# Resize mode.
bind -T zellij-resize Left resize-pane -L 5 \; switch-client -T zellij-resize
bind -T zellij-resize Down resize-pane -D 2 \; switch-client -T zellij-resize
bind -T zellij-resize Up resize-pane -U 2 \; switch-client -T zellij-resize
bind -T zellij-resize Right resize-pane -R 5 \; switch-client -T zellij-resize
bind -T zellij-resize h resize-pane -L 5 \; switch-client -T zellij-resize
bind -T zellij-resize j resize-pane -D 2 \; switch-client -T zellij-resize
bind -T zellij-resize k resize-pane -U 2 \; switch-client -T zellij-resize
bind -T zellij-resize l resize-pane -R 5 \; switch-client -T zellij-resize
bind -T zellij-resize H resize-pane -R 5 \; switch-client -T zellij-resize
bind -T zellij-resize J resize-pane -U 2 \; switch-client -T zellij-resize
bind -T zellij-resize K resize-pane -D 2 \; switch-client -T zellij-resize
bind -T zellij-resize L resize-pane -L 5 \; switch-client -T zellij-resize
bind -T zellij-resize "+" display-message "Use h/j/k/l in resize mode for tmux." \; switch-client -T zellij-resize
bind -T zellij-resize "=" display-message "Use h/j/k/l in resize mode for tmux." \; switch-client -T zellij-resize
bind -T zellij-resize "-" display-message "Use H/J/K/L in resize mode for tmux." \; switch-client -T zellij-resize
bind -T zellij-resize r switch-client -T zellij-normal
bind -T zellij-resize Enter switch-client -T root
bind -T zellij-resize Escape switch-client -T root
bind -T zellij-resize C-g switch-client -T root

# Move mode.
bind -T zellij-move Left swap-pane -d -t "{left-of}" \; switch-client -T zellij-move
bind -T zellij-move Down swap-pane -d -t "{down-of}" \; switch-client -T zellij-move
bind -T zellij-move Up swap-pane -d -t "{up-of}" \; switch-client -T zellij-move
bind -T zellij-move Right swap-pane -d -t "{right-of}" \; switch-client -T zellij-move
bind -T zellij-move h swap-pane -d -t "{left-of}" \; switch-client -T zellij-move
bind -T zellij-move j swap-pane -d -t "{down-of}" \; switch-client -T zellij-move
bind -T zellij-move k swap-pane -d -t "{up-of}" \; switch-client -T zellij-move
bind -T zellij-move l swap-pane -d -t "{right-of}" \; switch-client -T zellij-move
bind -T zellij-move n rotate-window -D \; switch-client -T zellij-move
bind -T zellij-move p rotate-window -U \; switch-client -T zellij-move
bind -T zellij-move Tab rotate-window -D \; switch-client -T zellij-move
bind -T zellij-move m switch-client -T zellij-normal
bind -T zellij-move Enter switch-client -T root
bind -T zellij-move Escape switch-client -T root
bind -T zellij-move C-g switch-client -T root

# Session mode.
bind -T zellij-session a display-message "tmux has no zellij about plugin." \; switch-client -T root
bind -T zellij-session c display-message "Edit ~/.config/tmux/tmux.conf, then press r here or Ctrl-b R to reload." \; switch-client -T root
bind -T zellij-session d detach-client \; switch-client -T root
bind -T zellij-session n command-prompt -I "#S" "rename-session '%%'" \; switch-client -T root
bind -T zellij-session p display-message "tmux has no built-in plugin manager UI." \; switch-client -T root
bind -T zellij-session r source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded" \; switch-client -T root
bind -T zellij-session s choose-tree -Zs \; switch-client -T root
bind -T zellij-session w choose-tree -Zw \; switch-client -T root
bind -T zellij-session x choose-tree -Zs "confirm-before -p 'kill session %%? (y/n)' 'kill-session -t %%'" \; switch-client -T root
bind -T zellij-session X choose-client -Z "confirm-before -p 'detach client %%? (y/n)' 'detach-client -t %%'" \; switch-client -T root
bind -T zellij-session ? display-popup -w 80% -h 80% -T "tmux keymap hints" -E "less -R ~/.config/tmux/tmux_keys.txt" \; switch-client -T root
bind -T zellij-session o switch-client -T zellij-normal
bind -T zellij-session Enter switch-client -T root
bind -T zellij-session Escape switch-client -T root
bind -T zellij-session C-g switch-client -T root

# Copy mode tweaks to feel more vi/zellij friendly.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
